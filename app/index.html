<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Maintenance</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
}

.container{
    padding:80px 20px;
}

.maintenance{
    color:#facc15;
    font-size:32px;
    font-weight:bold;
    margin-top:40px;
}

.message{
    font-size:18px;
    margin-top:20px;
    line-height:1.8;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    margin-top:30px;
    background:#f59e0b;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<h1>🔧 Server Under Maintenance</h1>

<div class="maintenance">
⚠️ We’ll Be Back Soon
</div>

<div class="message">
Our DevOps team is currently performing scheduled maintenance.<br>
Services may be temporarily unavailable during this time.<br><br>

Please check back later.
</div>

<button>
Maintenance in Progress
</button>

</div>
</body>
</html>>
